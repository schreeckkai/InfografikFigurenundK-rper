<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Hintergrundfarbe -->
  <rect width="800" height="600" fill="#0f172a" rx="24"/>
  
  <!-- Header / Titel -->
  <text x="400" y="60" font-family="sans-serif" font-size="32" font-weight="900" fill="#E63946" text-anchor="middle" letter-spacing="2">MATHE SCHRECK - CHEAT SHEET</text>
  <text x="400" y="90" font-family="sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Formelübersicht für mathematische Figuren und Körper</text>

  <!-- Box Links: 2D Figuren -->
  <rect x="40" y="130" width="340" height="230" fill="#1e293b" rx="16" />
  <text x="210" y="165" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">2D FIGUREN (Fläche &amp; Umfang)</text>
  <line x1="60" y1="180" x2="360" y2="180" stroke="#334155" stroke-width="2"/>
  
  <!-- Dreieck -->
  <path d="M70 220 L110 220 L90 195 Z" fill="none" stroke="#E63946" stroke-width="3" stroke-linejoin="round"/>
  <text x="130" y="210" font-family="sans-serif" font-size="14" fill="#cbd5e1" font-weight="bold">Dreieck</text>
  <text x="130" y="228" font-family="sans-serif" font-size="12" fill="#94a3b8">A = ½ · g · h</text>
  
  <!-- Kreis -->
  <circle cx="90" cy="270" r="16" fill="none" stroke="#E63946" stroke-width="3"/>
  <text x="130" y="265" font-family="sans-serif" font-size="14" fill="#cbd5e1" font-weight="bold">Kreis</text>
  <text x="130" y="283" font-family="sans-serif" font-size="12" fill="#94a3b8">A = π · r² | U = 2 · π · r</text>

  <!-- Trapez -->
  <path d="M70 330 L110 330 L100 305 L80 305 Z" fill="none" stroke="#E63946" stroke-width="3" stroke-linejoin="round"/>
  <text x="130" y="320" font-family="sans-serif" font-size="14" fill="#cbd5e1" font-weight="bold">Trapez</text>
  <text x="130" y="338" font-family="sans-serif" font-size="12" fill="#94a3b8">A = (a+c)/2 · h</text>

  <!-- Box Rechts: 3D Körper -->
  <rect x="420" y="130" width="340" height="230" fill="#1e293b" rx="16" />
  <text x="590" y="165" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">3D KÖRPER (Volumen)</text>
  <line x1="440" y1="180" x2="740" y2="180" stroke="#334155" stroke-width="2"/>

  <!-- Quader -->
  <rect x="440" y="200" width="30" height="20" fill="none" stroke="#E63946" stroke-width="3" stroke-linejoin="round"/>
  <path d="M440 200 L450 190 L480 190 L470 200 Z" fill="none" stroke="#E63946" stroke-width="2"/>
  <path d="M480 190 L480 210 L470 220" fill="none" stroke="#E63946" stroke-width="2"/>
  <text x="500" y="210" font-family="sans-serif" font-size="14" fill="#cbd5e1" font-weight="bold">Quader</text>
  <text x="500" y="228" font-family="sans-serif" font-size="12" fill="#94a3b8">V = a · b · c</text>

  <!-- Zylinder -->
  <ellipse cx="455" cy="260" rx="15" ry="6" fill="none" stroke="#E63946" stroke-width="2"/>
  <line x1="440" y1="260" x2="440" y2="285" stroke="#E63946" stroke-width="3"/>
  <line x1="470" y1="260" x2="470" y2="285" stroke="#E63946" stroke-width="3"/>
  <ellipse cx="455" cy="285" rx="15" ry="6" fill="none" stroke="#E63946" stroke-width="3"/>
  <text x="500" y="270" font-family="sans-serif" font-size="14" fill="#cbd5e1" font-weight="bold">Zylinder</text>
  <text x="500" y="288" font-family="sans-serif" font-size="12" fill="#94a3b8">V = π · r² · h</text>

  <!-- Pyramide -->
  <path d="M440 335 L470 335 L455 305 Z" fill="none" stroke="#E63946" stroke-width="3" stroke-linejoin="round"/>
  <path d="M455 305 L460 330" fill="none" stroke="#E63946" stroke-width="1"/>
  <text x="500" y="320" font-family="sans-serif" font-size="14" fill="#cbd5e1" font-weight="bold">Pyramide</text>
  <text x="500" y="338" font-family="sans-serif" font-size="12" fill="#94a3b8">V = ⅓ · G · h</text>

  <!-- Footer / Merk-Kasten -->
  <rect x="40" y="390" width="720" height="170" fill="#E63946" fill-opacity="0.1" stroke="#E63946" stroke-width="2" rx="16" />
  <text x="400" y="425" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">KERNKONZEPTE ZUM MERKEN</text>
  
  <circle cx="80" cy="460" r="5" fill="#E63946"/>
  <text x="100" y="465" font-family="sans-serif" font-size="14" fill="#cbd5e1"><tspan font-weight="bold" fill="#ffffff">Umfang (1D):</tspan> Die Wegstrecke einmal um die Figur herum (z.B. Zaun bauen). Einheit: cm, m.</text>
  
  <circle cx="80" cy="495" r="5" fill="#E63946"/>
  <text x="100" y="500" font-family="sans-serif" font-size="14" fill="#cbd5e1"><tspan font-weight="bold" fill="#ffffff">Flächeninhalt (2D):</tspan> Der Platz auf der Figur (z.B. Teppich verlegen). Einheit: cm², m².</text>

  <circle cx="80" cy="530" r="5" fill="#E63946"/>
  <text x="100" y="535" font-family="sans-serif" font-size="14" fill="#cbd5e1"><tspan font-weight="bold" fill="#ffffff">Volumen (3D):</tspan> Der Rauminhalt eines Körpers (z.B. Wasser in ein Glas füllen). Einheit: cm³, Liter.</text>
</svg>
